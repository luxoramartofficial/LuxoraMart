<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMING SOON | PMX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Floating Blue Spheres */
        .orb {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe);
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(10px);
            animation: float 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 250px;
            height: 250px;
            top: 15%;
            left: 20%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 150px;
            height: 150px;
            bottom: 25%;
            right: 15%;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            50% {
                transform: translateY(-50px) translateX(30px);
            }
        }

        /* Wave Effect on Bottom */
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20vh;
            background: linear-gradient(to top, rgba(79, 172, 254, 0.2), transparent);
            border-radius: 50% 50% 0 0;
            filter: blur(20px);
            transform: scaleX(1.5);
        }

        /* Content Styles */
        .container {
            text-align: center;
            z-index: 10;
        }

        .status-text {
            font-weight: 300;
            color: #cbd5e1;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .coming-soon-title {
            font-size: 5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #ffffff 50%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Bouncing Dots Loader */
        .loader {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 2rem;
        }

        .dot {
            width: 15px;
            height: 15px;
            background-color: #4facfe;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.7);
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .coming-soon-title {
                font-size: 3rem;
                letter-spacing: 4px;
            }
            .orb-1 { width: 150px; height: 150px; }
            .orb-2 { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="wave"></div>
    
    <div class="container">
        <p class="status-text">Our developers are still working hard in the background...</p>
        <h1 class="coming-soon-title">Coming Soon</h1>
        
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
